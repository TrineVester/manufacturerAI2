# PrusaSlicer profile for Original Prusa i3 MK3S
# @printer-profile: Original Prusa i3 MK3S
# @print-profile: 0.20mm QUALITY
# @material-profile: Prusament PLA
# @thumbnails: 16x16/PNG,220x124/PNG

# Layer settings
layer_height = 0.2
first_layer_height = 0.2
perimeters = 3
top_solid_layers = 4
bottom_solid_layers = 3

# Infill
fill_density = 20%
fill_pattern = grid

# Speed
perimeter_speed = 45
infill_speed = 80
travel_speed = 150

# Ironing (enabled for ink deposition surface)
ironing = 1
ironing_type = top
ironing_flowrate = 15%
ironing_spacing = 0.1
