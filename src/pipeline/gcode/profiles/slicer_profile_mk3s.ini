# PrusaSlicer CLI profile — Prusa MK3S, PLA, 0.2 mm layers
# Generated by ManufacturerAI — edit freely.

# --- Printer ---
printer_model = MK3S
gcode_flavor = marlin
bed_shape = 0x0,250x0,250x210,0x210
nozzle_diameter = 0.4
start_gcode = M140 S[first_layer_bed_temperature] ; set bed temp\nM104 S[first_layer_temperature] ; set extruder temp\nM190 S[first_layer_bed_temperature] ; wait for bed temp\nM109 S[first_layer_temperature] ; wait for extruder temp\nM862.3 P \"MK3S\" ; printer model check\nM862.1 P0.4 ; nozzle diameter check\nM115 U3.14.0 ; tell printer latest fw version\nG28 W ; home all without mesh bed level\nG80 ; mesh bed leveling\nG1 Z0.20 F720\nG1 Y-3 F1000 ; go outside print area\nG92 E0\nG1 X60 E9 F1000 ; intro line\nG1 X100 E12.5 F1000 ; intro line\nG92 E0\nM221 S95
end_gcode = G4 ; wait\nM104 S0 ; turn off temperature\nM140 S0 ; turn off heatbed\nM107 ; turn off fan\nG1 X0 Y200 ; home X axis\nM84 ; disable motors

# --- Print ---
layer_height = 0.2
first_layer_height = 0.2
perimeters = 3
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 5%
fill_pattern = grid
infill_speed = 45
perimeter_speed = 45
travel_speed = 100

# --- Temperatures ---
temperature = 215
first_layer_temperature = 215
bed_temperature = 40
first_layer_bed_temperature = 40

# --- Retraction ---
retract_length = 0.8
retract_speed = 35
retract_lift = 0.6

# --- Cooling ---
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
bridge_fan_speed = 100

# --- Small feature preservation ---
ensure_vertical_shell_thickness = 0
thick_bridges = 0

# --- Support ---
support_material = 1
support_material_buildplate_only = 1
support_material_pattern = rectilinear
support_material_spacing = 3
support_material_contact_distance = 0.25
support_material_xy_spacing = 75%
support_material_interface_layers = 3
support_material_interface_spacing = 0.2
support_material_interface_contact_loops = 0
support_material_threshold = 55
dont_support_bridges = 1

# --- Brim ---
brim_width = 5
brim_type = outer_only
brim_separation = 0.1

# --- Travel / retraction improvements ---
wipe = 1
avoid_crossing_perimeters = 1
avoid_crossing_perimeters_max_detour = 0
seam_position = aligned

# --- Ironing ---
ironing = 1
ironing_type = top
ironing_flowrate = 8%
ironing_speed = 15
ironing_spacing = 0.1
