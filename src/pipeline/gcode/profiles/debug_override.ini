# PrusaSlicer overrides for debug test prints.
# Loaded AFTER the main printer profile + filament overrides.
# Forces 100% solid infill, minimal perimeters, no support/brim.

fill_density = 100%
perimeters = 1
top_solid_layers = 0
bottom_solid_layers = 0

support_material = 0
brim_width = 0
skirts = 0
